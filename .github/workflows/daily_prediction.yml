name: Predicción Diaria de Reelección

on:
  schedule:
    # Se ejecuta todos los días a las 08:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # Permite ejecución manual

jobs:
  run-model:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Tests
      env:
        PYTHONPATH: .
      run: |
        pytest tests/

    - name: Ejecutar Pipeline Principal
      env:
        BCRA_TOKEN: ${{ secrets.BCRA_TOKEN }}
      run: |
        # Configurar PYTHONPATH para que reconozca los módulos locales
        PYTHONPATH=. python main.py

    - name: Commit y Push de los nuevos datos
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add data/ docs/ README.md assets/
        # Solo hace commit si hay cambios reales en los datos
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Actualización diaria de predicción y datos macroeconómicos" && git push)
